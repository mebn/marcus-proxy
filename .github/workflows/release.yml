name: Release

on:
  push:
    branches: [main]
    paths: [wails.json]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check product version
        id: version
        run: |
          node <<'NODE'
          const fs = require("fs");
          const cp = require("child_process");

          const current = JSON.parse(fs.readFileSync("wails.json", "utf8")).info?.productVersion;
          if (!current) throw new Error("wails.json must set info.productVersion");

          let previous = "";
          try {
            previous = JSON.parse(cp.execSync("git show HEAD^:wails.json", { encoding: "utf8" })).info?.productVersion || "";
          } catch {}

          const changed = process.env.GITHUB_EVENT_NAME === "workflow_dispatch" || current !== previous;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\nversion=${current}\ntag=v${current}\n`);
          NODE

      - uses: actions/setup-go@v5
        if: steps.version.outputs.changed == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install tools
        if: steps.version.outputs.changed == 'true'
        run: |
          brew install makensis
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install "github.com/wailsapp/wails/v2/cmd/wails@$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)"

      - name: Build apps
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          wails build -clean -trimpath -platform darwin/universal
          APP_PATH="$(find build/bin -maxdepth 1 -type d -name '*.app' -print -quit)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/Marcus-Proxy-${VERSION}-macOS-universal.zip"

          wails build -trimpath -platform windows/amd64 -nsis
          cp build/bin/*installer.exe "dist/Marcus-Proxy-${VERSION}-windows-amd64-installer.exe"

      - name: Publish GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "Marcus Proxy ${VERSION}" \
              --notes "Release ${VERSION}"
          fi
